<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>MineCodes</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="layout-waterfall">
  <div class="app-container" id="app">

    <!-- 导航轨道 -->
    <nav class="navigation-rail" id="navRail">
      <div class="rail-items">
        <button class="rail-item active" data-view="home" title="首页">
          <span class="material-symbols-outlined">home</span>
        </button>
        <button class="rail-item" data-view="favorite" title="收藏">
          <span class="material-symbols-outlined">favorite</span>
        </button>
        <button class="rail-item" data-view="settings" title="设置">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
    </nav>

    <!-- 右侧内容区 -->
    <div class="content-area">

      <!-- 顶部应用栏 -->
      <header class="top-app-bar">
        <h1 class="headline-large">MineCodes</h1>
        <div class="window-controls">
          <button class="icon-button win-btn" id="min-btn">
            <span class="material-symbols-outlined">minimize</span>
          </button>
          <button class="icon-button win-btn" id="max-btn">
            <span class="material-symbols-outlined">crop_square</span>
          </button>
          <button class="icon-button win-btn" id="close-btn">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </header>

      <main>
        <!-- 首页视图 -->
        <div class="view active" id="view-home">
          <div class="search-area">
            <div class="search-bar">
              <span class="material-symbols-outlined search-icon">search</span>
              <input type="text" placeholder="搜索MC指令..." class="body-large" id="searchInput">
            </div>
          </div>
          <!-- 分类栏 -->
          <div class="categories-bar" id="categoriesBar">
            <!-- 动态生成分类按钮 -->
          </div>
          <div class="cards-grid" id="commandsContainer">
            <!-- 动态生成卡片 -->
          </div>
        </div>

        <!-- 收藏视图 -->
        <div class="view" id="view-favorite">
          <div class="cards-grid" id="favoritesContainer">
            <!-- 动态生成收藏卡片 -->
          </div>
        </div>

        <!-- 设置视图 -->
        <div class="view" id="view-settings">
          <div class="settings-container">
            <!-- 外观分组 -->
            <div class="settings-group">
              <h3 class="headline-small settings-group-title">外观</h3>
              <div class="md3-card filled-card settings-item">
                <div class="settings-item-row">
                  <div class="settings-item-text">
                    <span class="body-large">深色模式</span>
                    <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant);">切换界面明暗主题</span>
                  </div>
                  <label class="m3-switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="m3-switch-slider"></span>
                  </label>
                </div>
              </div>
              <div class="md3-card filled-card settings-item" style="margin-top: 12px;">
                <div class="settings-item-row">
                  <div class="settings-item-text">
                    <span class="body-large">瀑布流布局</span>
                    <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant);">指令卡片以瀑布流形式排列</span>
                  </div>
                  <label class="m3-switch">
                    <input type="checkbox" id="layoutToggle" checked>
                    <span class="m3-switch-slider"></span>
                  </label>
                </div>
              </div>
            </div>

            <!-- 关于分组 -->
            <div class="settings-group">
              <h3 class="headline-small settings-group-title">关于</h3>
              <div class="md3-card filled-card settings-item">
                <div class="settings-item-col">
                  <span class="body-large">MineCodes</span>
                  <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant);">版本 0.2.3 测试版</span>
                  <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant); margin-top: 8px;">策划：ZionyasVan（DXL）</span>
                  <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant);">开发：ZionyasVan & YasVnite</span>
                  <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant);">联系我们：2223857511@qq.com</span>
                  <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant); margin-top: 8px;">MineCodes与Minecrosft、Mojang无任何从属关系。</span>
                </div>
              </div>
            </div>

            <!-- 日志分组 -->
            <div class="settings-group">
              <h3 class="headline-small settings-group-title">日志</h3>
              <div class="md3-card filled-card settings-item">
                <div class="settings-item-col">
                  <button class="text-button label-large" id="viewLogBtn" style="align-self: flex-start;">查看运行日志</button>
                </div>
              </div>
              <!-- 更新日志区域 -->
              <div class="settings-item" style="margin-top: 12px;">
                <h3 class="headline-small" style="margin: 0 0 12px 0;">更新日志</h3>
                <div id="changelogContainer">
                  <!-- 动态填充 -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- FAB -->
      <button class="fab">
        <span class="material-symbols-outlined">add</span>
      </button>
    </div>
  </div>

  <!-- Snackbar 提示 -->
  <div class="snackbar" id="snackbar">
    <span class="snackbar-text">提示信息</span>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');
    const fs = require('fs');

    // ========== 点击音效 ==========
    const clickSoundPath = path.join(__dirname, 'res', 'data', 'ui', 'click.ogg');
    const clickSoundUrl = 'file:///' + clickSoundPath.replace(/\\/g, '/');
    function playClickSound() {
      const audio = new Audio(clickSoundUrl);
      audio.play().catch(() => {});
    }
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (btn) playClickSound();
    });

    // ========== 窗口控制 ==========
    document.getElementById('min-btn').addEventListener('click', () => {
      ipcRenderer.send('window-minimize');
    });
    document.getElementById('max-btn').addEventListener('click', () => {
      ipcRenderer.send('window-maximize');
    });
    document.getElementById('close-btn').addEventListener('click', () => {
      ipcRenderer.send('window-close');
    });

    // 监听窗口状态变化，更新最大化图标
    ipcRenderer.on('window-state-change', (event, state) => {
      const maxBtnIcon = document.querySelector('#max-btn .material-symbols-outlined');
      if (!maxBtnIcon) return;
      if (state === 'maximized') {
        maxBtnIcon.textContent = 'filter_none';
      } else {
        maxBtnIcon.textContent = 'crop_square';
      }
    });

    // ========== 视图标题映射 ==========
    const viewTitles = {
      home: 'MineCodes',
      favorite: '收藏',
      settings: '设置'
    };

    // ========== 导航轨道视图切换 ==========
    const railItems = document.querySelectorAll('.rail-item');
    const views = document.querySelectorAll('.view');

    railItems.forEach(item => {
      item.addEventListener('click', () => {
        railItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const targetView = item.getAttribute('data-view');
        views.forEach(view => {
          view.classList.remove('active');
          if (view.id === 'view-' + targetView) {
            view.classList.add('active');
          }
        });

        // 更新标题文字
        document.querySelector('.headline-large').textContent = viewTitles[targetView] || 'MineCodes';

        // 切换到收藏视图时自动加载收藏列表
        if (targetView === 'favorite') {
          loadFavorites();
        }
        // 切换到设置视图时，加载更新日志
        if (targetView === 'settings') {
          loadChangelog();
        }
      });
    });

    // 创建“回到顶部”按钮
    const railNav = document.querySelector('.rail-items');
    if (railNav) {
      const backToTopBtn = document.createElement('button');
      backToTopBtn.className = 'rail-item';
      backToTopBtn.title = '回到顶部';
      backToTopBtn.style.display = 'none';
      const iconSpan = document.createElement('span');
      iconSpan.className = 'material-symbols-outlined';
      iconSpan.textContent = 'arrow_upward';
      backToTopBtn.appendChild(iconSpan);
      railNav.appendChild(backToTopBtn);

      backToTopBtn.addEventListener('click', () => {
        const mainEl = document.querySelector('main');
        if (mainEl) mainEl.scrollTo({ top: 0, behavior: 'smooth' });
      });

      const mainEl = document.querySelector('main');
      if (mainEl) {
        mainEl.addEventListener('scroll', () => {
          if (mainEl.scrollTop > 20) {
            backToTopBtn.style.display = '';
          } else {
            backToTopBtn.style.display = 'none';
          }
        });
      }
    }

    // ========== 从主进程获取指令数据 ==========
    let commands = [];
    const commandsContainer = document.getElementById('commandsContainer');
    const categoriesBar = document.getElementById('categoriesBar');
    let currentCategory = '全部';

    async function loadCommands() {
      try {
        commands = await ipcRenderer.invoke('get-commands');
        buildCategories();
        renderCommands();
      } catch (err) {
        commandsContainer.innerHTML = `<p class="body-medium">指令加载失败：${err.message}</p>`;
      }
    }

    function buildCategories() {
      const kinds = new Set(['全部']);
      commands.forEach(cmd => {
        if (cmd.kind) kinds.add(cmd.kind);
      });
      const kindList = Array.from(kinds);
      categoriesBar.innerHTML = '';
      kindList.forEach(kind => {
        const btn = document.createElement('button');
        btn.className = 'category-tab';
        if (kind === currentCategory) btn.classList.add('active');
        btn.textContent = kind;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = kind;
          renderCommands(searchInput.value);
        });
        categoriesBar.appendChild(btn);
      });
    }

    function renderCommands(filter = '') {
      commandsContainer.innerHTML = '';
      const lowerFilter = filter.toLowerCase();
      let filtered = commands.filter(cmd =>
        cmd.name.toLowerCase().includes(lowerFilter) ||
        cmd.desc.toLowerCase().includes(lowerFilter)
      );
      if (currentCategory !== '全部') {
        filtered = filtered.filter(cmd => cmd.kind === currentCategory);
      }

      filtered.forEach(cmd => {
        const card = document.createElement('div');
        card.className = 'md3-card filled-card';
        card.innerHTML = `
          <div class="card-content">
            <h3 class="headline-small">${cmd.name}</h3>
            <p class="body-medium">${cmd.desc}</p>
          </div>
          <div class="card-actions">
            <button class="text-button label-large copy-btn" data-usage="${cmd.usage.replace(/"/g, '&quot;')}">复制指令</button>
            <button class="text-button label-large detail-btn" data-id="${cmd.id}">查看详情</button>
          </div>
        `;
        commandsContainer.appendChild(card);
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const usage = e.currentTarget.getAttribute('data-usage');
          navigator.clipboard.writeText(usage).then(() => {
            showSnackbar('指令已复制到剪贴板');
          }).catch(() => {
            showSnackbar('复制失败，请手动复制');
          });
        });
      });

      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const cmd = commands.find(c => c.id === id);
          if (cmd) ipcRenderer.send('open-detail', cmd);
        });
      });
    }

    // ========== 收藏视图渲染 ==========
    const favoritesContainer = document.getElementById('favoritesContainer');

    async function loadFavorites() {
      try {
        if (commands.length === 0) {
          commands = await ipcRenderer.invoke('get-commands');
        }
        const favIds = await ipcRenderer.invoke('get-favorites');
        const favCommands = commands.filter(cmd => favIds.includes(cmd.id));

        favoritesContainer.innerHTML = '';
        if (favCommands.length === 0) {
          favoritesContainer.innerHTML = `<div class="placeholder-view">
            <span class="material-symbols-outlined" style="font-size:48px;color:var(--md-sys-color-primary);">favorite_border</span>
            <h2 class="headline-small">暂无收藏</h2>
            <p class="body-medium">在指令详情中点击收藏按钮添加到这里。</p>
          </div>`;
          return;
        }

        favCommands.forEach(cmd => {
          const card = document.createElement('div');
          card.className = 'md3-card filled-card';
          card.innerHTML = `
            <div class="card-content">
              <h3 class="headline-small">${cmd.name}</h3>
              <p class="body-medium">${cmd.desc}</p>
            </div>
            <div class="card-actions">
              <button class="text-button label-large unfav-btn" data-id="${cmd.id}">取消收藏</button>
              <button class="text-button label-large copy-btn" data-usage="${cmd.usage.replace(/"/g, '&quot;')}">复制指令</button>
              <button class="text-button label-large detail-btn" data-id="${cmd.id}">查看详情</button>
            </div>
          `;
          favoritesContainer.appendChild(card);
        });

        document.querySelectorAll('.unfav-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const cmdId = e.currentTarget.getAttribute('data-id');
            await ipcRenderer.invoke('toggle-favorite', cmdId);
            loadFavorites();
          });
        });
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const usage = e.currentTarget.getAttribute('data-usage');
            navigator.clipboard.writeText(usage).then(() => showSnackbar('指令已复制到剪贴板')).catch(() => showSnackbar('复制失败，请手动复制'));
          });
        });
        document.querySelectorAll('.detail-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const cmd = commands.find(c => c.id === id);
            if (cmd) ipcRenderer.send('open-detail', cmd);
          });
        });
      } catch (err) {
        favoritesContainer.innerHTML = `<p class="body-medium">收藏加载失败：${err.message}</p>`;
      }
    }

    // ========== 更新日志加载 ==========
    function loadChangelog() {
      const container = document.getElementById('changelogContainer');
      if (!container) return;
      try {
        const changelogPath = path.join(__dirname, 'changelog.json');
        if (!fs.existsSync(changelogPath)) {
          container.innerHTML = `<p class="body-medium">暂无更新日志。</p>`;
          return;
        }
        const raw = fs.readFileSync(changelogPath, 'utf-8');
        const changelog = JSON.parse(raw);
        if (changelog.length === 0) {
          container.innerHTML = `<p class="body-medium">暂无更新内容。</p>`;
          return;
        }
        container.innerHTML = '';
        changelog.forEach(entry => {
          const item = document.createElement('div');
          item.className = 'md3-card filled-card settings-item';
          item.style.marginBottom = '12px';
          item.innerHTML = `
            <div class="settings-item-col">
              <span class="body-large">版本 ${entry.version}</span>
              <span class="body-medium" style="color: var(--md-sys-color-on-surface-variant);">${entry.date}</span>
              <ul style="margin: 8px 0 0 16px; padding: 0; color: var(--md-sys-color-on-surface-variant);">
                ${entry.changes.map(change => `<li class="body-medium">${change}</li>`).join('')}
              </ul>
            </div>
          `;
          container.appendChild(item);
        });
      } catch (e) {
        container.innerHTML = `<p class="body-medium">更新日志加载失败：${e.message}</p>`;
      }
    }

    // ========== 搜索 ==========
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      renderCommands(e.target.value);
    });

    // ========== Snackbar ==========
    function showSnackbar(message) {
      const snackbar = document.getElementById('snackbar');
      snackbar.querySelector('.snackbar-text').textContent = message;
      snackbar.classList.add('show');
      clearTimeout(snackbar.hideTimer);
      snackbar.hideTimer = setTimeout(() => {
        snackbar.classList.remove('show');
      }, 3000);
    }

    // 查看运行日志按钮
    const viewLogBtn = document.getElementById('viewLogBtn');
    if (viewLogBtn) {
      viewLogBtn.addEventListener('click', () => {
        const logPath = path.join(__dirname, 'app.log');
        if (fs.existsSync(logPath)) {
          const content = fs.readFileSync(logPath, 'utf-8');
          alert('日志内容：\n\n' + content);
        } else {
          alert('暂无日志文件。');
        }
      });
    }

    // ========== 深色模式 ==========
    const darkModeToggle = document.getElementById('darkModeToggle');
    if (darkModeToggle) {
      const savedTheme = localStorage.getItem('minecodes_theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        darkModeToggle.checked = true;
      } else {
        document.body.classList.remove('dark-theme');
        darkModeToggle.checked = false;
      }
      darkModeToggle.addEventListener('change', () => {
        if (darkModeToggle.checked) {
          document.body.classList.add('dark-theme');
          localStorage.setItem('minecodes_theme', 'dark');
        } else {
          document.body.classList.remove('dark-theme');
          localStorage.setItem('minecodes_theme', 'light');
        }
      });
    }

    // ========== 布局切换 ==========
    const layoutToggle = document.getElementById('layoutToggle');
    if (layoutToggle) {
      const savedLayout = localStorage.getItem('minecodes_layout');
      if (savedLayout === 'list') {
        document.body.classList.remove('layout-waterfall');
        document.body.classList.add('layout-list');
        layoutToggle.checked = false;
      } else {
        document.body.classList.add('layout-waterfall');
        document.body.classList.remove('layout-list');
        layoutToggle.checked = true;
      }
      layoutToggle.addEventListener('change', () => {
        if (layoutToggle.checked) {
          document.body.classList.add('layout-waterfall');
          document.body.classList.remove('layout-list');
          localStorage.setItem('minecodes_layout', 'waterfall');
        } else {
          document.body.classList.remove('layout-waterfall');
          document.body.classList.add('layout-list');
          localStorage.setItem('minecodes_layout', 'list');
        }
        if (typeof renderCommands === 'function') renderCommands(searchInput.value);
      });
    }

    // 首次加载与切换时加载更新日志（已在导航事件中处理）
    loadCommands();

    // 点击标题文字返回顶部
    document.querySelector('.headline-large').addEventListener('click', () => {
      const mainEl = document.querySelector('main');
      if (mainEl) mainEl.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
